<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="$FLUTTER_BASE_HREF">
    <title>Telegram Counter Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto Oxide', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: #fff;
        }
        #app {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="app">
    <div style="text-align: center; color: #999;">
        <p>Загрузка приложения...</p>
    </div>
</div>
<script defer src="main.dart.js"></script>
<script>
    // Инициализируем Telegram Web App
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.setHeaderColor('#2196F3');
        window.Telegram.WebApp.setBackgroundColor('#ffffff');

        // Получаем данные пользователя
        const user = window.Telegram.WebApp.initDataUnsafe.user;
        console.log('Telegram User:', user);
    }
</script>
</body>
</html>
